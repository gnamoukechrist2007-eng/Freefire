<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔥 Free Fire Community</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU LATÉRAL -->
    <div id="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="drawer">
        <div id="drawer-header">
            <div id="drawer-avatar">
                <img id="drawer-avatar-img" src="https://ui-avatars.com/api/?name=User&size=80&background=e94560&color=fff" alt="Avatar">
            </div>
            <div id="drawer-user-info">
                <div id="drawer-name">Non connecté</div>
                <div id="drawer-email"></div>
            </div>
        </div>
        <nav id="drawer-nav">
            <a href="index.html" class="drawer-link active">🏠 Accueil</a>
            <a href="publier.html" class="drawer-link">📤 Publier</a>
            <a href="recherche.html" class="drawer-link">🔍 Recherche</a>
            <a href="profil.html" class="drawer-link">👤 Mon Profil</a>
            <a href="#" class="drawer-link" onclick="signOut(); closeDrawer();">🚪 Déconnexion</a>
        </nav>
        <div id="drawer-footer">
            <small>Free Fire Community v3.0</small>
        </div>
    </div>

    <!-- HEADER -->
    <header id="main-header">
        <div id="header-left">
            <button id="menu-btn" onclick="toggleDrawer()">☰</button>
            <h1>🔥 Free Fire</h1>
        </div>
        <div id="header-right">
            <button id="login-btn" onclick="signInWithGoogle()">🔑 Connexion</button>
            <button id="logout-btn" onclick="signOut()" style="display:none;">🚪</button>
        </div>
    </header>

    <!-- CONTENU -->
    <main id="main-content">
        <div id="content-wrapper">
            <div id="page-content">
                <h2>📰 Fil d'actualité</h2>
                
                <!-- Bouton publier -->
                <div style="text-align:center;margin-bottom:20px;">
                    <a href="publier.html" style="display:inline-block;padding:12px 30px;background:#e94560;color:white;border-radius:25px;text-decoration:none;font-weight:bold;">📤 Publier une vidéo</a>
                </div>

                <!-- Fil des vidéos -->
                <div id="videos-feed">
                    <p style="color:#555;text-align:center;padding:20px 0;">⏳ Chargement des vidéos...</p>
                </div>
            </div>
        </div>
    </main>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="auth.js"></script>
    <script src="drawer.js"></script>
    <script src="video.js"></script>
</body>
    </html>
